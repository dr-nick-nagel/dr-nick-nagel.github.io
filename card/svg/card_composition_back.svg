<?xml version="1.0" encoding="UTF-8"?>

<svg id='nn_card_02'
    xmlns="http://www.w3.org/2000/svg"
    version="1.1"
    width="3.5in"
    height="2.0in"
    viewBox="0 0 350 200"
    xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
    xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    >

    <title>Nick Nagel: Author, Architect &amp; Engineer</title>

    <desc>
        Back composition for SVG Creators Collaborative.
    </desc>

    <defs  id="defs_nn_card">
        <linearGradient
            id="linearGradient17"
            inkscape:collect="always">
            <stop
                style="stop-color:#ffeeaa;stop-opacity:1;"
                offset="0"
                id="stop17" />
            <stop
                style="stop-color:#ffeeaa;stop-opacity:0;"
                offset="1"
                id="stop18" />
        </linearGradient>
        <linearGradient
        id="linearGradient15"
        inkscape:collect="always">
        <stop
            style="stop-color:#003189;stop-opacity:1;"
            offset="0"
            id="stop15" />
        <stop
            style="stop-color:#a9ebff;stop-opacity:1;"
            offset="1"
            id="stop16" />
        </linearGradient>
        <inkscape:path-effect
        effect="powerstroke"
        id="path-effect14"
        is_visible="true"
        lpeversion="1.3"
        scale_width="1"
        interpolator_type="CentripetalCatmullRom"
        interpolator_beta="0.2"
        start_linecap_type="zerowidth"
        end_linecap_type="zerowidth"
        offset_points="0.23352873,1.1060128 | 0.97526263,0.19839828 | 1.6286887,1.2796543"
        linejoin_type="round"
        miter_limit="4"
        not_jump="false"
        sort_points="true"
        message="&lt;b&gt;Ctrl + click&lt;/b&gt; on existing node and move it" />
        <inkscape:path-effect
        effect="powerstroke"
        id="path-effect13"
        is_visible="true"
        lpeversion="1.3"
        scale_width="1"
        interpolator_type="CentripetalCatmullRom"
        interpolator_beta="0.2"
        start_linecap_type="zerowidth"
        end_linecap_type="zerowidth"
        offset_points="0.25777063,0.47384717 | 2,1 | 3.8,1"
        linejoin_type="round"
        miter_limit="4"
        not_jump="false"
        sort_points="true"
        message="&lt;b&gt;Ctrl + click&lt;/b&gt; on existing node and move it" />
        <inkscape:path-effect
        effect="powerstroke"
        id="path-effect12"
        is_visible="true"
        lpeversion="1.3"
        scale_width="1"
        interpolator_type="CentripetalCatmullRom"
        interpolator_beta="0.2"
        start_linecap_type="square"
        end_linecap_type="zerowidth"
        offset_points="0.2,1 | 0.5,1 | 0.7645063,0.62110199"
        linejoin_type="round"
        miter_limit="4"
        not_jump="false"
        sort_points="true"
        message="&lt;b&gt;Ctrl + click&lt;/b&gt; on existing node and move it" />
        <inkscape:path-effect
        effect="powerstroke"
        id="path-effect11"
        is_visible="true"
        lpeversion="1.3"
        scale_width="1"
        interpolator_type="CentripetalCatmullRom"
        interpolator_beta="0.2"
        start_linecap_type="square"
        end_linecap_type="zerowidth"
        offset_points="0.2,1 | 0.5,1 | 0.8,1"
        linejoin_type="round"
        miter_limit="4"
        not_jump="false"
        sort_points="true"
        message="&lt;b&gt;Ctrl + click&lt;/b&gt; on existing node and move it" />
        <inkscape:path-effect
        effect="powerstroke"
        id="path-effect10"
        is_visible="true"
        lpeversion="1.3"
        scale_width="1"
        interpolator_type="CentripetalCatmullRom"
        interpolator_beta="0.2"
        start_linecap_type="zerowidth"
        end_linecap_type="zerowidth"
        offset_points="0.2,1 | 1.5,1 | 2.7776969,0.48713839"
        linejoin_type="round"
        miter_limit="4"
        not_jump="false"
        sort_points="true"
        message="&lt;b&gt;Ctrl + click&lt;/b&gt; on existing node and move it" />
        <linearGradient
        inkscape:collect="always"
        xlink:href="#linearGradient15"
        id="linearGradient16"
        x1="-48.815212"
        y1="50.257839"
        x2="51.582497"
        y2="-50.146336"
        gradientUnits="userSpaceOnUse" />
        <radialGradient
            inkscape:collect="always"
            xlink:href="#linearGradient17"
            id="radialGradient18"
            cx="20.483149"
            cy="-27.122955"
            fx="20.483149"
            fy="-27.122955"
            r="10.038182"
            gradientTransform="matrix(0.02164649,-1.4064092,1.146736,-0.08363189,53.014102,8.2625488)"
            gradientUnits="userSpaceOnUse" />
    </defs>


    <!-- ====================================================== -->
    <!-- Background                                              -->
    <!-- ====================================================== -->

    <g id="card_background">
        <rect id="card_background_rect"
            x="0"
            y="0"
            width="350"
            height="200"
            fill="#000000"/>
    </g>

    <!-- ====================================================== -->
    <!-- QR                                                     -->
    <!-- ====================================================== -->

    <g id="nn_qr"
        transform="translate(28,36)">
        <rect  id="qr_placeholder"
            x="0"
            y="0"
            width="90"
            height="90"
            fill="#999"
            stroke="#7af"
            stroke-width="1"/>
        <text  x="45"
            y="108"
            text-anchor="middle"
            font-family="Helvetica,Arial,sans-serif"
            font-size="10"
            font-weight="700"
            fill="#2e92cc">nicknagel.com</text>
        <text x="45"
            y="122"
            text-anchor="middle"
            font-family="Helvetica,Arial,sans-serif"
            font-size="8"
            fill="#fdde2c">Scan to Explore</text>
    </g>

    <!-- ====================================================== -->
    <!-- Navigation                                              -->
    <!-- ====================================================== -->

    <g  id="nn_navigation"
        transform="translate(195,42)">
        <!-- Books -->
        <text
            x="0"
            y="0"
            text-anchor="start"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">
            &#8226;
        </text>
        <text
            x="12"
            y="0"
            text-anchor="start"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">Books</text>
        <!-- Blog -->
        <text
            x="0"
            y="16"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee"> &#8226;</text>
        <text
            x="12"
            y="16"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">Blog</text>
        <!-- GitHub -->
        <text
            x="0"
            y="32"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">&#8226;</text>

        <text
            x="12"
            y="32"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">GitHub</text>
        <!-- Interactive Demos -->
        <text
            x="0"
            y="48"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">&#8226;</text>
        <text
            x="12"
            y="48"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">Interactive Demos</text>
        <!-- Artwork -->
        <text
            x="0"
            y="64"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">&#8226;</text>
        <text
            x="12"
            y="64"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">Artwork</text>
        <!-- Contact -->
        <text
            x="0"
            y="80"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">&#8226;</text>
        <text
            x="12"
            y="80"
            font-family="Helvetica,Arial,sans-serif"
            font-size="12"
            fill="#eee">Contact</text>
    </g>


    <!-- ====================================================== -->
    <!-- Divider                                                 -->
    <!-- ====================================================== -->

    <g id="card_divider_vert">
        <line
            x1="155"
            y1="24"
            x2="155"
            y2="176"
            stroke="#5ac"
            stroke-width="1"/>
    </g>

</svg>

