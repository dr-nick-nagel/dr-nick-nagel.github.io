<?xml version="1.0" encoding="UTF-8"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    version="1.1"

    width="3.5in"
    height="2.0in"

    viewBox="0 0 350 200">

    <title>SVG Creators Collaborative Business Card</title>

    <desc>
        Front composition for SVG Creators Collaborative.
    </desc>

    <!-- ====================================================== -->
    <!-- Background                                              -->
    <!-- ====================================================== -->

    <g id="background">

        <rect
            x="0"
            y="0"
            width="350"
            height="200"

            fill="#ffffff"/>

    </g>

    <!-- ====================================================== -->
    <!-- Logo                                                    -->
    <!-- ====================================================== -->

    <g id="logo">

        <!-- Placeholder only -->

        <circle

            cx="175"
            cy="48"
            r="28"

            fill="none"

            stroke="#303030"
            stroke-width="2"/>

    </g>

    <!-- ====================================================== -->
    <!-- Organization                                            -->
    <!-- ====================================================== -->

    <g id="organization">

        <text

            x="175"
            y="92"

            text-anchor="middle"

            font-family="Helvetica,Arial,sans-serif"
            font-size="14"
            font-weight="700"
            letter-spacing="1.5"

            fill="#222222">

            SVG Creators Collaborative™

        </text>

    </g>

    <!-- ====================================================== -->
    <!-- Identity                                                -->
    <!-- ====================================================== -->

    <g id="identity">

        <text

            x="175"
            y="114"

            text-anchor="middle"

            font-family="Helvetica,Arial,sans-serif"
            font-size="11"
            font-weight="600"

            fill="#444444">

            Dr. Nick Nagel

        </text>

        <text

            x="175"
            y="130"

            text-anchor="middle"

            font-family="Helvetica,Arial,sans-serif"
            font-size="8"

            fill="#666666">

            AI Research • Software Engineering

        </text>

        <text

            x="175"
            y="142"

            text-anchor="middle"

            font-family="Helvetica,Arial,sans-serif"
            font-size="8"

            fill="#666666">

            Author • Interactive SVG • Visualization

        </text>

    </g>

    <!-- ====================================================== -->
    <!-- Divider                                                 -->
    <!-- ====================================================== -->

    <g id="divider">

        <line

            x1="80"
            y1="156"

            x2="270"
            y2="156"

            stroke="#bbbbbb"
            stroke-width="0.5"/>

    </g>

    <!-- ====================================================== -->
    <!-- Website                                                 -->
    <!-- ====================================================== -->

    <g id="website">

        <text

            x="175"
            y="178"

            text-anchor="middle"

            font-family="Helvetica,Arial,sans-serif"
            font-size="11"
            font-weight="700"

            fill="#000000">

            nicknagel.com

        </text>

    </g>

</svg>




